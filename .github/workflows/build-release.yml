name: 📦 Build APK & Publish Release

on:
  push:
    tags:
      - 'v*'          # Se ejecuta al crear tags como v1.0.0, v1.2.3
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🛠️ Build APK (Release)
        run: flutter build apk --release --split-per-abi

      - name: 📝 Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d ' ' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release & Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "🎧 PipeBox v${{ steps.version.outputs.version }}"
          body: "📦 APKs generados automáticamente.\n🔹 `arm64-v8a`\n🔹 `armeabi-v7a`\n🔹 `x86_64`"
          draft: false
          prerelease: false
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}