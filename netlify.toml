[build]
  # Netlify ejecutará esto en sus servidores Ubuntu
  command = "curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.4-stable.tar.xz | tar -xJ && export PATH=\"$PWD/flutter/bin:$PATH\" && flutter pub get && flutter build web --release --wasm"
  publish = "build/web"

# 🔁 Redirección SPA: evita 404 al recargar rutas internas
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 📦 Caché optimizada para assets de Flutter
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/flutter_*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"